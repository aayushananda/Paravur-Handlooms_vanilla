<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Paravur Handlooms</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.9/dist/lenis.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#FAF9F6] text-[#2D2D2D] font-sans antialiased">
  
  <div id="header-placeholder"></div>

  <main class="min-h-screen flex items-center justify-center pt-32 pb-24">
    <div class="max-w-md w-full mx-auto px-4 md:px-8">
      
      <div class="bg-white border border-[#e5e4e7] p-8 shadow-sm">
        <h1 class="font-serif text-3xl md:text-4xl text-[#2D2D2D] mb-2 text-center">Welcome Back</h1>
        <p class="font-sans text-sm text-[#555555] text-center mb-8">Login to access your profile and history</p>

        <form id="login-form" class="space-y-6">
          <div id="error-msg" class="hidden text-red-600 text-xs font-sans mb-4 text-center">Invalid email or password. Spaces are not allowed.</div>
          
          <div>
            <label for="name" class="block font-sans text-xs uppercase tracking-wider text-[#555555] mb-2">Full Name</label>
            <input required type="text" id="name" name="name" class="w-full px-4 py-3 bg-[#FAF9F6] border border-[#e5e4e7] focus:border-[#2D2D2D] focus:ring-0 outline-none transition-colors font-sans text-sm" placeholder="Arjun Menon">
          </div>
          
          <div>
            <label for="address" class="block font-sans text-xs uppercase tracking-wider text-[#555555] mb-2">Address</label>
            <input required type="text" id="address" name="address" class="w-full px-4 py-3 bg-[#FAF9F6] border border-[#e5e4e7] focus:border-[#2D2D2D] focus:ring-0 outline-none transition-colors font-sans text-sm" placeholder="123 Chendamangalam St">
          </div>

          <div>
            <label for="email" class="block font-sans text-xs uppercase tracking-wider text-[#555555] mb-2">Email</label>
            <input required type="email" id="email" name="email" class="w-full px-4 py-3 bg-[#FAF9F6] border border-[#e5e4e7] focus:border-[#2D2D2D] focus:ring-0 outline-none transition-colors font-sans text-sm" placeholder="you@example.com">
          </div>
          
          <div>
            <label for="password" class="block font-sans text-xs uppercase tracking-wider text-[#555555] mb-2">Password</label>
            <input required minlength="6" type="password" id="password" name="password" class="w-full px-4 py-3 bg-[#FAF9F6] border border-[#e5e4e7] focus:border-[#2D2D2D] focus:ring-0 outline-none transition-colors font-sans text-sm" placeholder="••••••••">
          </div>

          <button type="submit" class="w-full bg-[#2D2D2D] text-[#FAF9F6] font-sans px-8 py-4 uppercase tracking-widest text-sm hover:bg-[#8B2500] transition-colors duration-300">
            Sign In
          </button>
        </form>
      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
