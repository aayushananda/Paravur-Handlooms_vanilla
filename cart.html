<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Paravur Handlooms</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.9/dist/lenis.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#FAF9F6] text-[#2D2D2D] font-sans antialiased">
  
  <div id="header-placeholder"></div>

  <main class="min-h-screen pt-32 pb-24">
    <div class="max-w-7xl mx-auto px-4 md:px-8">
      
      <!-- Cart Header -->
      <div class="flex flex-col md:flex-row justify-between items-end mb-12 border-b border-[#e5e4e7] pb-8">
        <div>
          <h1 class="font-serif text-4xl md:text-5xl text-[#2D2D2D] mb-4">Your Cart</h1>
          <p class="font-sans text-sm text-[#555555] uppercase tracking-widest" id="cart-item-count-label">
            0 Items
          </p>
        </div>
        <div class="mt-6 md:mt-0">
          <a href="collection.html" class="font-sans text-sm uppercase tracking-widest text-[#2D2D2D] border-b border-[#2D2D2D] pb-1 hover:text-[#C5A059] hover:border-[#C5A059] transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Continue Shopping
          </a>
        </div>
      </div>

      <div class="flex flex-col lg:flex-row gap-16">
        <!-- Cart Items List -->
        <div class="lg:w-2/3">
          <div id="cart-items-container" class="space-y-8">
            <!-- Rendered via cartPage.js -->
          </div>
          
          <div id="empty-cart-message" class="hidden py-16 text-center border-2 border-dashed border-[#e5e4e7]">
            <h3 class="font-serif text-2xl text-[#2D2D2D] mb-4">Your cart is empty</h3>
            <p class="font-sans text-[#555555] mb-8">Looks like you haven't added any items to your cart yet.</p>
            <a href="collection.html" class="inline-block font-sans text-xs uppercase tracking-widest text-[#FAF9F6] bg-[#2D2D2D] px-8 py-4 hover:bg-[#8B2500] transition-colors">
              Explore Collection
            </a>
          </div>
        </div>

        <!-- Order Summary -->
        <div class="lg:w-1/3">
          <div class="bg-white border border-[#e5e4e7] p-8 sticky top-32">
            <h3 class="font-sans text-sm uppercase tracking-widest text-[#2D2D2D] font-semibold mb-6 pb-4 border-b border-[#e5e4e7]">
              Order Summary
            </h3>
            
            <div class="space-y-4 mb-6 text-sm text-[#555555]">
              <div class="flex justify-between">
                <span>Subtotal</span>
                <span id="summary-subtotal" class="font-semibold text-[#2D2D2D]">₹0</span>
              </div>
              <div class="flex justify-between">
                <span>Shipping</span>
                <span>Calculated at checkout</span>
              </div>
            </div>
            
            <div class="border-t border-[#e5e4e7] pt-4 mb-8">
              <div class="flex justify-between items-center">
                <span class="font-serif text-xl text-[#2D2D2D]">Total</span>
                <span id="summary-total" class="font-serif text-2xl text-[#2D2D2D]">₹0</span>
              </div>
            </div>
            
            <button class="w-full bg-[#2D2D2D] text-[#FAF9F6] font-sans px-8 py-4 uppercase tracking-widest text-sm hover:bg-[#8B2500] transition-colors disabled:opacity-50 disabled:cursor-not-allowed" id="checkout-btn">
              Proceed to Checkout
            </button>
          </div>
        </div>
      </div>

      <!-- Recommendations Section -->
      <div class="mt-32 pt-16 border-t border-[#e5e4e7]">
        <div class="flex justify-between items-end mb-12">
          <h2 class="font-serif text-3xl md:text-4xl text-[#2D2D2D]">You May Also Like</h2>
        </div>
        <div id="recommendations-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
          <!-- Rendered via cartPage.js -->
        </div>
      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cartPage.js"></script>
</body>
</html>
