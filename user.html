<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Paravur Handlooms</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.9/dist/lenis.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#FAF9F6] text-[#2D2D2D] font-sans antialiased">
  
  <div id="header-placeholder"></div>

  <main class="min-h-screen pt-32 pb-24">
    <div class="max-w-4xl mx-auto px-4 md:px-8">
      
      <div class="flex flex-col md:flex-row justify-between items-end mb-12 border-b border-[#e5e4e7] pb-8">
        <div>
          <h1 class="font-serif text-4xl md:text-5xl text-[#2D2D2D] mb-2">My Profile</h1>
          <p class="font-sans text-sm text-[#555555] uppercase tracking-widest">Account Details</p>
        </div>
        <button id="logout-btn" class="mt-6 md:mt-0 font-sans text-sm uppercase tracking-widest text-red-600 border-b border-red-600 pb-1 hover:text-red-800 hover:border-red-800 transition-colors">
          Log Out
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
        <!-- Profile Info -->
        <div class="md:col-span-1 space-y-8">
          <div class="bg-white border border-[#e5e4e7] p-6">
            <h2 class="font-sans text-xs uppercase tracking-widest text-[#C5A059] font-semibold mb-6 pb-4 border-b border-[#e5e4e7]">Personal Info</h2>
            
            <div class="space-y-4">
              <div>
                <p class="font-sans text-xs uppercase tracking-wider text-[#555555] mb-1">Name</p>
                <p id="profile-name" class="font-sans text-sm text-[#2D2D2D] font-semibold"></p>
              </div>
              <div>
                <p class="font-sans text-xs uppercase tracking-wider text-[#555555] mb-1">Email</p>
                <p id="profile-email" class="font-sans text-sm text-[#2D2D2D] font-semibold"></p>
              </div>
              <div>
                <p class="font-sans text-xs uppercase tracking-wider text-[#555555] mb-1">Saved Address</p>
                <p id="profile-address" class="font-sans text-sm text-[#2D2D2D] font-semibold"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Order History -->
        <div class="md:col-span-2">
          <div class="bg-white border border-[#e5e4e7] p-6">
            <h2 class="font-sans text-xs uppercase tracking-widest text-[#C5A059] font-semibold mb-6 pb-4 border-b border-[#e5e4e7]">Order History</h2>
            
            <div class="space-y-6">
              <!-- Mock Order -->
              <div class="border border-[#e5e4e7] p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-[#C5A059] transition-colors">
                <div>
                  <p class="font-sans text-xs text-[#555555] mb-1">Order #PHW-K9XJ2L</p>
                  <p class="font-serif text-lg text-[#2D2D2D]">Traditional Set Saree</p>
                  <p class="font-sans text-xs text-[#aaa]">Aug 12, 2024</p>
                </div>
                <div class="flex items-center gap-4">
                  <span class="inline-block px-3 py-1 bg-green-50 text-green-700 font-sans text-xs tracking-widest uppercase rounded-sm border border-green-200">Delivered</span>
                  <span class="font-sans text-sm font-semibold text-[#2D2D2D]">₹3,500</span>
                </div>
              </div>
              
              <!-- Mock Order -->
              <div class="border border-[#e5e4e7] p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-[#C5A059] transition-colors">
                <div>
                  <p class="font-sans text-xs text-[#555555] mb-1">Order #PHW-M3T8P</p>
                  <p class="font-serif text-lg text-[#2D2D2D]">Double Mundu</p>
                  <p class="font-sans text-xs text-[#aaa]">Dec 05, 2023</p>
                </div>
                <div class="flex items-center gap-4">
                  <span class="inline-block px-3 py-1 bg-green-50 text-green-700 font-sans text-xs tracking-widest uppercase rounded-sm border border-green-200">Delivered</span>
                  <span class="font-sans text-sm font-semibold text-[#2D2D2D]">₹2,800</span>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
